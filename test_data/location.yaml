# location测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

location_001:
  test_purpose: 验证基础功能-精确匹配location
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location = /exact {
      return 200 "Exact Location";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost/exact"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Exact Location"

location_002:
  test_purpose: 验证基础功能-前缀匹配location
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /prefix {
      return 200 "Prefix Match";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost/prefix/path"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Prefix Match"

location_003:
  test_purpose: 验证基础功能-正则匹配location
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location ~ \.(gif|jpg|png)$ {
      return 200 "Image Regex Match";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost/test.png"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Image Regex Match"

location_004:
  test_purpose: 验证基础功能-不区分大小写正则匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location ~* \.(jpg|jpeg|png|gif)$ {
      return 200 "Case Insensitive Regex";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost/test.JPG"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Case Insensitive Regex"

location_005:
  test_purpose: 验证基础功能-优先匹配location ^~
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location ^~ /static {
      return 200 "Prefix Priority Match";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost/static/file.txt"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Prefix Priority Match"

location_006:
  test_purpose: 验证匹配优先级-精确匹配(=)优先于正则和前缀匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 18090;
      server_name localhost;
      location / {
        return 200 "General Prefix Hit";
      }
      location ~* ^/api {
        return 200 "Regex Hit";
      }
      location = /api/exact {
        return 200 "Exact Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost:18090/api/exact"
  expected_result:
    - "test is successful"
    - "Exact Hit"
  unexpected_result:
    - "Regex Hit"
    - "General Prefix Hit"

location_007:
  test_purpose: 验证匹配优先级-^~前缀匹配优先于正则匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 18090;
      server_name localhost;
      location / {
        return 200 "General Prefix Hit";
      }
      location ~* \.html$ {
        return 200 "Regex Hit";
      }
      location ^~ /static/ {
        return 200 "Priority Prefix Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost:18090/static/page.html"
  expected_result:
    - "test is successful"
    - "Priority Prefix Hit"
  unexpected_result:
    - "Regex Hit"
    - "General Prefix Hit"

location_008:
  test_purpose: 验证匹配优先级-正则匹配优先于普通前缀匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 18090;
      server_name localhost;
      location / {
        return 200 "General Prefix Hit";
      }
      location /images/ {
        return 200 "Prefix Hit";
      }
      location ~* \.(png|jpg|gif)$ {
        return 200 "Regex Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost:18090/images/logo.png"
  expected_result:
    - "test is successful"
    - "Regex Hit"
  unexpected_result:
    - "Prefix Hit"
    - "General Prefix Hit"

location_009:
  test_purpose: 验证匹配优先级-普通前缀匹配优先于通用/匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 18090;
      server_name localhost;
      location / {
        return 200 "General Prefix Hit";
      }
      location /api/ {
        return 200 "Prefix Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost:18090/api/users"
  expected_result:
    - "test is successful"
    - "Prefix Hit"
  unexpected_result:
    - "General Prefix Hit"

location_010:
  test_purpose: 验证匹配优先级-全部共存时完整优先级链(= > ^~ > 正则 > 普通前缀 > /)
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 18090;
      server_name localhost;
      location / {
        return 200 "General Prefix Hit";
      }
      location /app {
        return 200 "Prefix Hit";
      }
      location ~* ^/app {
        return 200 "Regex Hit";
      }
      location ^~ /app/static {
        return 200 "Priority Prefix Hit";
      }
      location = /app/static/main.js {
        return 200 "Exact Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl http://localhost:18090/app/static/main.js"
    - "curl http://localhost:18090/app/static/other.js"
    - "curl http://localhost:18090/app/page"
    - "curl http://localhost:18090/other"
  expected_result:
    - "test is successful"
    - "Exact Hit"
    - "Priority Prefix Hit"
    - "Regex Hit"
    - "General Prefix Hit"
