# proxy_hide_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

proxy_hide_header_001:
  test_purpose: 验证基础功能-隐藏单个自定义响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    server {
      listen 18081;
      server_name localhost;
      location / {
        add_header X-Secret-Info "sensitive_data";
        add_header X-Public-Info "public_data";
        return 200 "upstream ok";
      }
    }
    server {
      listen 18080;
      server_name localhost;
      location /test_hide_single {
        proxy_pass http://127.0.0.1:18081/;
        proxy_hide_header X-Secret-Info;
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost:18080/test_hide_single"
  expected_result:
    - "test is successful"
    - "upstream ok"
    - "X-Public-Info: public_data"
  unexpected_result:
    - "X-Secret-Info"
