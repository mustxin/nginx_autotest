# server_name测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

server_name_001:
  test_purpose: 验证基础功能-精确匹配server_name
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - hosts配置正确
  config_content: |
    server {
      listen 80;
      server_name exact.example.com;
      location / {
        return 200 "Exact Match";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: exact.example.com\" http://localhost/"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Exact Match"

server_name_002:
  test_purpose: 验证基础功能-通配符匹配server_name
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name *.example.com;
      location / {
        return 200 "Wildcard Match";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: sub.example.com\" http://localhost/"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Wildcard Match"

server_name_003:
  test_purpose: 验证基础功能-正则匹配server_name
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name ~^www\d+\.example\.com$;
      location / {
        return 200 "Regex Match";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: www123.example.com\" http://localhost/"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Regex Match"

server_name_004:
  test_purpose: 验证匹配优先级-精确匹配优先于通配符和正则
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name ~^.+\.example\.com$;
      location / {
        return 200 "Regex Hit";
      }
    }
    server {
      listen 80;
      server_name *.example.com;
      location / {
        return 200 "Wildcard Hit";
      }
    }
    server {
      listen 80;
      server_name priority.example.com;
      location / {
        return 200 "Exact Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: priority.example.com\" http://localhost/"
  expected_result:
    - "test is successful"
    - "Exact Hit"
  unexpected_result:
    - "Wildcard Hit"
    - "Regex Hit"

server_name_005:
  test_purpose: 验证匹配优先级-前缀通配符(*.x)优先于正则匹配
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name ~^.+\.example\.com$;
      location / {
        return 200 "Regex Hit";
      }
    }
    server {
      listen 80;
      server_name *.example.com;
      location / {
        return 200 "Wildcard Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: any.example.com\" http://localhost/"
  expected_result:
    - "test is successful"
    - "Wildcard Hit"
  unexpected_result:
    - "Regex Hit"

server_name_006:
  test_purpose: 验证匹配优先级-前缀通配符(*.x)优先于后缀通配符(x.*)
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name www.example.*;
      location / {
        return 200 "Suffix Wildcard Hit";
      }
    }
    server {
      listen 80;
      server_name *.example.com;
      location / {
        return 200 "Prefix Wildcard Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: www.example.com\" http://localhost/"
  expected_result:
    - "test is successful"
    - "Prefix Wildcard Hit"
  unexpected_result:
    - "Suffix Wildcard Hit"

server_name_007:
  test_purpose: 验证匹配优先级-正则按配置顺序匹配第一个
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name ~^www\d+\.example\.com$;
      location / {
        return 200 "First Regex Hit";
      }
    }
    server {
      listen 80;
      server_name ~^www.+\.example\.com$;
      location / {
        return 200 "Second Regex Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: www123.example.com\" http://localhost/"
  expected_result:
    - "test is successful"
    - "First Regex Hit"
  unexpected_result:
    - "Second Regex Hit"

server_name_008:
  test_purpose: 验证匹配优先级-未匹配任何server_name时由default_server处理
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    server {
      listen 80;
      server_name specific.example.com;
      location / {
        return 200 "Specific Hit";
      }
    }
    server {
      listen 80 default_server;
      server_name _;
      location / {
        return 200 "Default Server Hit";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -H \"Host: nomatch.other.com\" http://localhost/"
  expected_result:
    - "test is successful"
    - "Default Server Hit"
  unexpected_result:
    - "Specific Hit"
