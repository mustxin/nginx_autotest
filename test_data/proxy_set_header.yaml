# proxy_set_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

proxy_set_header_001:
  test_purpose: 验证基础功能-添加自定义请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    location /test_add_header {
      proxy_pass http://127.0.0.1:80;
      proxy_set_header X-Test-Header "test123";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_add_header"
  expected_result:
    - "configuration file"
    - "test is successful"

proxy_set_header_002:
  test_purpose: 验证基础功能-修改Host请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    location /test_modify_host {
      proxy_pass http://127.0.0.1:80;
      proxy_set_header Host "modified.host.com";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v -H \"Host: original.host.com\" http://localhost/test_modify_host"
  expected_result:
    - "configuration file"
    - "test is successful"

proxy_set_header_003:
  test_purpose: 验证基础功能-添加多个请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    location /test_multi_headers {
      proxy_pass http://127.0.0.1:80;
      proxy_set_header X-Custom-1 "value1";
      proxy_set_header X-Custom-2 "value2";
      proxy_set_header X-Custom-3 "value3";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_multi_headers"
  expected_result:
    - "configuration file"
    - "test is successful"

proxy_set_header_004:
  test_purpose: 验证基础功能-使用变量设置请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    location /test_variable {
      proxy_pass http://127.0.0.1:80;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_variable"
  expected_result:
    - "configuration file"
    - "test is successful"

proxy_set_header_005:
  test_purpose: 验证边界条件-空值请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx服务已启动
  config_content: |
    location /test_empty_header {
      proxy_pass http://127.0.0.1:80;
      proxy_set_header X-Empty "";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "configuration file"
    - "test is successful"
