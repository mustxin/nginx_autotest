# add_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

add_header_001:
  test_purpose: 验证基础功能-添加自定义响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_add_response_header {
      add_header X-Custom-Response "custom_value";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_add_response_header"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "X-Custom-Response: custom_value"
