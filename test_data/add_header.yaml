# add_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

add_header_001:
  test_purpose: 验证基础功能-添加自定义响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_add_response_header {
      add_header X-Custom-Response "custom_value";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_add_response_header"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "X-Custom-Response: custom_value"

add_header_002:
  test_purpose: 验证基础功能-添加多个响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_add_multi_headers {
      add_header X-Header-1 "value1";
      add_header X-Header-2 "value2";
      add_header X-Header-3 "value3";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_add_multi_headers"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "X-Header-1: value1"

add_header_003:
  test_purpose: 验证基础功能-使用变量设置响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_variable_header {
      add_header X-Request-Time $request_time;
      add_header X-Remote-Addr $remote_addr;
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_variable_header"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "X-Request-Time"

add_header_004:
  test_purpose: 验证基础功能-添加Cache-Control响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_cache_control {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_cache_control"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "Cache-Control: no-cache, no-store, must-revalidate"

add_header_005:
  test_purpose: 验证边界条件-添加Security响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_security_headers {
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-Content-Type-Options "nosniff";
      add_header X-XSS-Protection "1; mode=block";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_security_headers"
  expected_result:
    - "configuration file"
    - "test is successful"
    - "X-Frame-Options: SAMEORIGIN"

add_header_006:
  test_purpose: 验证边界条件-空值响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
  config_content: |
    location /test_empty_response_header {
      add_header X-Empty "";
      return 200 "OK";
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "configuration file"
    - "test is successful"
