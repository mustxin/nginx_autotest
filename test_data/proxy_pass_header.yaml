# proxy_pass_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}

proxy_pass_header_001:
  test_purpose: 验证基础功能-传递自定义响应头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - 后端服务可访问
  config_content: |
    location /test_pass_header {
      proxy_pass http://127.0.0.1:80;
      proxy_pass_header X-Custom-Response;
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
    - "curl -v http://localhost/test_pass_header"
  expected_result:
    - "configuration file"
    - "test is successful"

