grpc_set_header_004:
  test_purpose: 验证基础功能-gRPC同时设置多个自定义请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx支持gRPC模块(http_v2_module)
    - gRPC mock server已启动
  config_content: |
    server {
      listen 19080;
      http2 on;
      server_name localhost;
      location / {
        grpc_pass grpc://127.0.0.1:19090;
        grpc_set_header X-Header-A "value_a";
        grpc_set_header X-Header-B "value_b";
        grpc_set_header X-Header-C "value_c";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "test is successful"
  grpc_verify:
    target: "127.0.0.1:19080"
    message: "test_multi_headers"
    expect_metadata:
      x-header-a: "value_a"
      x-header-b: "value_b"
      x-header-c: "value_c"

grpc_set_header_005:
  test_purpose: 验证基础功能-gRPC使用Nginx变量设置请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx支持gRPC模块(http_v2_module)
    - gRPC mock server已启动
  config_content: |
    server {
      listen 19080;
      http2 on;
      server_name localhost;
      location / {
        grpc_pass grpc://127.0.0.1:19090;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Server-Port $server_port;
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "test is successful"
  grpc_verify:
    target: "127.0.0.1:19080"
    message: "test_nginx_variables"
    expect_metadata:
      x-real-ip: "127.0.0.1"
      x-server-port: "19080"

