# grpc_set_header模块测试数据
# 格式：用例ID: {测试目的, 前置条件, 配置内容, 操作命令, 预期结果}
# 功能验证用例通过 grpc_verify 字段指定 gRPC 客户端验证参数

grpc_set_header_001:
  test_purpose: 验证基础功能-gRPC添加自定义请求头并传递到后端
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx支持gRPC模块(http_v2_module)
    - gRPC mock server已启动
  config_content: |
    server {
      listen 19080;
      http2 on;
      server_name localhost;
      location / {
        grpc_pass grpc://127.0.0.1:19090;
        grpc_set_header X-Grpc-Test "grpc_value";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "test is successful"
  grpc_verify:
    target: "127.0.0.1:19080"
    message: "test_add_header"
    expect_metadata:
      x-grpc-test: "grpc_value"

grpc_set_header_002:
  test_purpose: 验证基础功能-gRPC覆盖客户端发送的请求头
  pre_condition:
    - Nginx配置文件路径已知
    - 已备份原始配置文件
    - Nginx支持gRPC模块(http_v2_module)
    - gRPC mock server已启动
  config_content: |
    server {
      listen 19080;
      http2 on;
      server_name localhost;
      location / {
        grpc_pass grpc://127.0.0.1:19090;
        grpc_set_header X-Client-Id "overridden_by_nginx";
      }
    }
  operate_commands:
    - "nginx -t"
    - "nginx -s reload"
  expected_result:
    - "test is successful"
  grpc_verify:
    target: "127.0.0.1:19080"
    message: "test_override_header"
    client_metadata:
      x-client-id: "original_value"
    expect_metadata:
      x-client-id: "overridden_by_nginx"

